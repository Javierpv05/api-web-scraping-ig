service: api-web-scraping-igp

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true   # Usa Docker para instalar dependencias limpiamente
    layer: true          # (opcional) crea una capa Lambda para reutilizar

provider:
  name: aws
  runtime: python3.9
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  role: arn:aws:iam::413507650058:role/LabRole   # <--- Línea CLAVE para evitar errores de permisos
  environment:
    TABLE_NAME: ${self:service}-${self:provider.stage}-sismos
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:Scan
      Resource: "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TABLE_NAME}"

functions:
  scrapeSismos:
    handler: handler.scrape_sismos
    events:
      - http:
          path: scrape
          method: get
          cors: true

resources:
  Resources:
    SismosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE_NAME}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
